<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GemeindeNetz wird geladen…</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f5f8;color:#111}.loader{text-align:center}.spinner{width:42px;height:42px;margin:0 auto 18px;border:4px solid rgba(36,107,253,.15);border-top-color:#246bfd;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="loader"><div class="spinner"></div><strong>GemeindeNetz wird geladen…</strong></div><script>(async()=>{try{const files=["chunks/chunk-00.txt","chunks/chunk-01.txt","chunks/chunk-02.txt","chunks/chunk-03.txt","chunks/chunk-04.txt","chunks/chunk-05.txt","chunks/chunk-06.txt","chunks/chunk-07.txt","chunks/chunk-08.txt","chunks/chunk-09.txt","chunks/chunk-10.txt","chunks/chunk-11.txt","chunks/chunk-12.txt","chunks/chunk-13.txt"];const parts=await Promise.all(files.map(f=>fetch(f).then(r=>{if(!r.ok)throw new Error(f);return r.text()})));document.open();document.write(parts.join(''));document.close()}catch(e){document.body.innerHTML='<p>Die Plattform konnte nicht geladen werden.</p>';console.error(e)}})();</script></body></html>
