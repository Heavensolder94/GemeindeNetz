name: Patch GemeindeNetz v3 browser conflicts

on:
  push:
    paths:
      - '.github/workflows/patch-v3-browser-conflicts.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch conflicting browser globals
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          content = path.read_text(encoding='utf-8')
          replacements = {
              "logout.onclick=logout;logoutTop.onclick=logout;": "document.getElementById('logout').onclick=logout;logoutTop.onclick=logout;",
              "location.value=u.city;listingModal.classList.remove('hidden')": "document.getElementById('location').value=u.city;listingModal.classList.remove('hidden')",
              "location:location.value.trim(),community:u.community": "location:document.getElementById('location').value.trim(),community:u.community",
          }
          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f'Expected source fragment not found: {old}')
              content = content.replace(old, new)
          path.write_text(content, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: avoid browser global name conflicts"
          git push
